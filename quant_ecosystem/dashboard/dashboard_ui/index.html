<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quant Ecosystem - Live System Map</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <header>
    <h1>Quant Ecosystem 3.0 - Live System Map</h1>
    <div id="status-pill">Connecting...</div>
  </header>
  <main>
    <section class="panel">
      <h2>System Map</h2>
      <div id="system-map" class="grid"></div>
    </section>
    <section class="panel">
      <h2>Strategy Panel</h2>
      <pre id="strategy-panel">Loading...</pre>
    </section>
    <section class="panel">
      <h2>Market Panel</h2>
      <pre id="market-panel">Loading...</pre>
    </section>
    <section class="panel">
      <h2>Event Stream</h2>
      <div id="event-stream" class="event-stream"></div>
    </section>
  </main>
  <script src="/ui/system_map.js"></script>
</body>
</html>
